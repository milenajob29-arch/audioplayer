        <div class="slider" id="volumeSlider">
          <div class="volume-fill" id="volumeFill"></div>
          <div class="handle" id="volumeHandle"></div>
        </div>
      </div>
      <span style="opacity:0.5;">${lang.retry}</span>
    </div>
    
    <div class="playlist" id="playlist"></div>
  </div>
  
  <script>
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const playlistBtn = document.getElementById("playlistBtn");
    const playlist = document.getElementById("playlist");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const current = document.getElementById("current");
    const total = document.getElementById("total");
    const track = document.getElementById("track");
    const artist = document.getElementById("artist");
    const volumeSlider = document.getElementById("volumeSlider");
    const volumeFill = document.getElementById("volumeFill");
    const volumeHandle = document.getElementById("volumeHandle");
    const volumeIcon = document.getElementById("volumeIcon");
    
    const tracks = ${tracksJSON};
    let currentTrack = 0;
    let isPlaying = false;
    let isShuffle = false;
    let volume = 0.7;
    
    function loadTrack(index) {
      if (index >= 0 && index < tracks.length) {
        currentTrack = index;
        audio.src = tracks[index].url;
        track.textContent = tracks[index].name;
        artist.textContent = tracks[index].artist;
        audio.load();
        updatePlaylist();
      }
    }
    
    function updatePlaylist() {
      let html = "";
      tracks.forEach((track, i) => {
        html += \`<div class="item \${i === currentTrack ? "active" : ""}" data-index="\${i}">
          <span>\${i+1}. \${track.name}</span>
          <span>\${track.artist}</span>
        </div>\`;
      });
      playlist.innerHTML = html;
      
      document.querySelectorAll(".item").forEach(item => {
        item.addEventListener("click", () => {
          const index = parseInt(item.dataset.index);
          loadTrack(index);
          if (isPlaying) audio.play();
        });
      });
    }
    
    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ":" + (secs < 10 ? "0" : "") + secs;
    }
    
    function updateVolume(value) {
      volume = Math.max(0, Math.min(1, value));
      audio.volume = volume;
      volumeFill.style.width = (volume * 100) + "%";
      volumeHandle.style.left = (volume * 100) + "%";
      if (volume === 0) volumeIcon.textContent = "🔇";
      else if (volume < 0.3) volumeIcon.textContent = "🔈";
      else if (volume < 0.7) volumeIcon.textContent = "🔉";
      else volumeIcon.textContent = "🔊";
    }
    
    playBtn.addEventListener("click", () => {
      if (!audio.src) loadTrack(0);
      if (isPlaying) {
        audio.pause();
      } else {
        audio.play();
      }
    });
    
    audio.addEventListener("play", () => {
      isPlaying = true;
      playBtn.textContent = "⏸️";
    });
    
    audio.addEventListener("pause", () => {
      isPlaying = false;
      playBtn.textContent = "${lang.play}";
    });
    
    audio.addEventListener("timeupdate", () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + "%";
        current.textContent = formatTime(audio.currentTime);
      }
    });
    
    audio.addEventListener("loadedmetadata", () => {
      total.textContent = formatTime(audio.duration);
    });
    
    audio.addEventListener("ended", () => {
      let next = isShuffle 
        ? Math.floor(Math.random() * tracks.length)
        : (currentTrack + 1) % tracks.length;
      loadTrack(next);
      if (isPlaying) audio.play();
    });
    
    progressBar.addEventListener("click", (e) => {
      const rect = progressBar.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      if (audio.duration) {
        audio.currentTime = percent * audio.duration;
      }
    });
    
    volumeSlider.addEventListener("mousedown", (e) => {
      const rect = volumeSlider.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      updateVolume(percent);
      
      const onMouseMove = (e) => {
        const rect = volumeSlider.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        updateVolume(percent);
      };
      
      const onMouseUp = () => {
        document.removeEventListener("mousemove", onMouseMove);
        document.removeEventListener("mouseup", onMouseUp);
      };
      
      document.addEventListener("mousemove", onMouseMove);
      document.addEventListener("mouseup", onMouseUp);
    });
    
    nextBtn.addEventListener("click", () => {
      let next = isShuffle 
        ? Math.floor(Math.random() * tracks.length)
        : (currentTrack + 1) % tracks.length;
      loadTrack(next);
      if (isPlaying) audio.play();
    });
    
    prevBtn.addEventListener("click", () => {
      let prev = isShuffle 
        ? Math.floor(Math.random() * tracks.length)
        : currentTrack > 0 ? currentTrack - 1 : tracks.length - 1;
      loadTrack(prev);
      if (isPlaying) audio.play();
    });
