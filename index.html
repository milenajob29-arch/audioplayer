<iframe srcdoc="
<!DOCTYPE html>
<html>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <style>
    body { 
      margin: 0; 
      background: transparent; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .player {
      background: #1a1a3a;
      border-radius: 24px;
      padding: 24px;
      color: white;
      width: 360px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .header {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }
    .cover {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .track {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .artist {
      font-size: 14px;
      opacity: 0.7;
    }
    .progress {
      margin: 24px 0;
    }
    .bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      cursor: pointer;
    }
    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 3px;
    }
    .time {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.7;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      margin: 24px 0;
    }
    .btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover {
      background: #4facfe;
      transform: scale(1.1);
    }
    .play-btn {
      width: 60px;
      height: 60px;
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      font-size: 28px;
    }
    .extra {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .volume {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider {
      width: 80px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }
    .volume-fill {
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 2px;
    }
    .handle {
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: -4px;
      left: 70%;
      transform: translateX(-50%);
      cursor: pointer;
    }
    .playlist {
      margin-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 20px;
      display: none;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
    }
    .item:hover {
      background: rgba(79,172,254,0.15);
    }
    .active {
      background: rgba(79,172,254,0.25);
      border-left: 3px solid #4facfe;
    }
    .code-block {
      margin-top: 20px;
      background: #0f0f2a;
      border-radius: 16px;
      padding: 16px;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .code-btn {
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      border: none;
      border-radius: 30px;
      padding: 6px 14px;
      color: #0a0a1a;
      font-weight: bold;
      cursor: pointer;
    }
    #codeDisplay {
      width: 100%;
      min-height: 80px;
      background: #1a1a3a;
      border: 1px solid #4facfe;
      border-radius: 12px;
      padding: 12px;
      color: #7bc8ff;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div style="width: 360px;">
    <!-- Плеер -->
    <div class="player">
      <audio id="audio"></audio>
      
      <div class="header">
        <div class="cover">🎵</div>
        <div class="info">
          <div class="track" id="track">Real Friends</div>
          <div class="artist" id="artist">Camila Cabello</div>
        </div>
      </div>
      
      <div class="progress">
        <div class="bar" id="progressBar">
          <div class="fill" id="progressFill"></div>
        </div>
        <div class="time">
          <span id="current">0:00</span>
          <span id="total">0:00</span>
        </div>
      </div>
      
      <div class="controls">
        <button class="btn" id="shuffleBtn">🔀</button>
        <button class="btn" id="prevBtn">⏮️</button>
        <button class="btn play-btn" id="playBtn">▶️</button>
        <button class="btn" id="nextBtn">⏭️</button>
        <button class="btn" id="playlistBtn">📋</button>
      </div>
      
      <div class="extra">
        <div class="volume">
          <span id="volumeIcon">🔊</span>
          <div class="slider" id="volumeSlider">
            <div class="volume-fill" id="volumeFill"></div>
            <div class="handle" id="volumeHandle"></div>
          </div>
        </div>
        <span style="opacity:0.5;">reintentar</span>
      </div>
      
      <div class="playlist" id="playlist">
        <div class="item active" data-index="0">
          <span>1. Real Friends</span>
          <span>Camila Cabello</span>
        </div>
        <div class="item" data-index="1">
          <span>2. Never Be the Same</span>
          <span>Camila Cabello</span>
        </div>
        <div class="item" data-index="2">
          <span>3. Havana</span>
          <span>Camila Cabello</span>
        </div>
      </div>
    </div>
    
    <!-- Блок с кодом (опционально, можно удалить) -->
    <div class="code-block">
      <div class="code-header">
        <span style="color: #aad0ff;">📋 Код для вставки</span>
        <button class="code-btn" id="showCodeBtn">Показать код</button>
      </div>
      <textarea id="codeDisplay" readonly placeholder="Нажмите кнопку чтобы увидеть код"></textarea>
    </div>
  </div>

  <script>
    // Простой и надежный код без ошибок
    (function() {
      // Элементы плеера
      const audio = document.getElementById('audio');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const shuffleBtn = document.getElementById('shuffleBtn');
      const playlistBtn = document.getElementById('playlistBtn');
      const playlist = document.getElementById('playlist');
      const trackEl = document.getElementById('track');
      const artistEl = document.getElementById('artist');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const currentTime = document.getElementById('current');
      const totalTime = document.getElementById('total');
      const volumeSlider = document.getElementById('volumeSlider');
      const volumeFill = document.getElementById('volumeFill');
      const volumeHandle = document.getElementById('volumeHandle');
      const volumeIcon = document.getElementById('volumeIcon');
      const showCodeBtn = document.getElementById('showCodeBtn');
      const codeDisplay = document.getElementById('codeDisplay');
      
      // Плейлист с реальными треками
      const tracks = [
        { name: 'Real Friends', artist: 'Camila Cabello', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
        { name: 'Never Be the Same', artist: 'Camila Cabello', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
        { name: 'Havana', artist: 'Camila Cabello', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' }
      ];
      
      let currentTrackIndex = 0;
      let isPlaying = false;
      let isShuffle = false;
      
      // Загрузка трека
      function loadTrack(index) {
        if (index >= 0 && index < tracks.length) {
          currentTrackIndex = index;
          audio.src = tracks[index].url;
          trackEl.textContent = tracks[index].name;
          artistEl.textContent = tracks[index].artist;
          audio.load();
          
          // Обновляем активный элемент в плейлисте
          document.querySelectorAll('.item').forEach((item, i) => {
            if (i === index) {
              item.classList.add('active');
            } else {
              item.classList.remove('active');
            }
          });
        }
      }
      
      // Формат времени
      function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return mins + ':' + (secs < 10 ? '0' : '') + secs;
      }
      
      // Обновление громкости
      function updateVolume(percent) {
        const vol = Math.max(0, Math.min(1, percent));
        audio.volume = vol;
        volumeFill.style.width = (vol * 100) + '%';
        volumeHandle.style.left = (vol * 100) + '%';
        
        if (vol === 0) volumeIcon.textContent = '🔇';
        else if (vol < 0.3) volumeIcon.textContent = '🔈';
        else if (vol < 0.7) volumeIcon.textContent = '🔉';
        else volumeIcon.textContent = '🔊';
      }
      
      // Play/Pause
      playBtn.addEventListener('click', () => {
        if (!audio.src) loadTrack(0);
        if (isPlaying) {
          audio.pause();
        } else {
          audio.play();
        }
      });
      
      audio.addEventListener('play', () => {
        isPlaying = true;
        playBtn.textContent = '⏸️';
      });
      
      audio.addEventListener('pause', () => {
        isPlaying = false;
        playBtn.textContent = '▶️';
      });
      
      audio.addEventListener('ended', () => {
        let next = isShuffle 
          ? Math.floor(Math.random() * tracks.length)
          : (currentTrackIndex + 1) % tracks.length;
        loadTrack(next);
        if (isPlaying) audio.play();
      });
      
      // Время
      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = percent + '%';
          currentTime.textContent = formatTime(audio.currentTime);
        }
      });
      
      audio.addEventListener('loadedmetadata', () => {
        totalTime.textContent = formatTime(audio.duration);
      });
      
      // Клик по прогрессу
      progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration) {
          audio.currentTime = percent * audio.duration;
        }
      });
      
      // Громкость
      volumeSlider.addEventListener('mousedown', (e) => {
        const rect = volumeSlider.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        updateVolume(percent);
        
        const onMouseMove = (e) => {
          const rect = volumeSlider.getBoundingClientRect();
          const percent = (e.clientX - rect.left) / rect.width;
          updateVolume(percent);
        };
        
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        };
        
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
      
      // Кнопки навигации
      nextBtn.addEventListener('click', () => {
        let next = isShuffle 
          ? Math.floor(Math.random() * tracks.length)
          : (currentTrackIndex + 1) % tracks.length;
        loadTrack(next);
        if (isPlaying) audio.play();
      });
      
      prevBtn.addEventListener('click', () => {
        let prev = isShuffle 
          ? Math.floor(Math.random() * tracks.length)
          : currentTrackIndex > 0 ? currentTrackIndex - 1 : tracks.length - 1;
        loadTrack(prev);
        if (isPlaying) audio.play();
      });
      
      // Shuffle
      shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.style.opacity = isShuffle ? '1' : '0.5';
      });
      
      // Плейлист
      playlistBtn.addEventListener('click', () => {
        const isOpen = playlist.style.display === 'block';
        playlist.style.display = isOpen ? 'none' : 'block';
      });
      
      // Клик по элементам плейлиста
      document.querySelectorAll('.item').forEach(item => {
        item.addEventListener('click', () => {
          const index = parseInt(item.dataset.index);
          loadTrack(index);
          if (isPlaying) audio.play();
        });
      });
      
      // Кнопка показа кода (просто для информации)
      if (showCodeBtn) {
        showCodeBtn.addEventListener('click', () => {
          codeDisplay.value = 'Код плеера уже вставлен в iframe. Просто скопируйте этот iframe в Genially.';
        });
      }
      
      // Инициализация
      loadTrack(0);
      updateVolume(0.7);
    })();
  </script>
</body>
</html>
" style="border: none; width: 100%; height: 700px; background: transparent;"></iframe>
