<div id="FX_ROOT">
  <style>
    * {
      margin: 0;

    .code-output {

    #codeDisplay {
      background: #0f0f2a;

    .copy-btn {
      background: #4facfe;
      border: none;
      border-radius: 30px;
      padding: 8px 20px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .copy-btn:hover {
      background: #00f2fe;
      transform: translateY(-2px);
    }
    
    .notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      color: #0a0a1a;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: bold;

      animation: slideUp 0.3s;
    }
    
    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>

  <div class="player-editor">
    <h2>
      🎵 РЕДАКТОР АУДИОПЛЕЕРА
      <span>milenajob29-arch/аудиоплеер</span>
    </h2>
    
    <div class="editor-layout">
      <!-- Панель настроек -->
      <div class="settings-panel">
        <div class="settings-group">
          <h3>🎨 Цвета</h3>
          
          <div class="setting-row">
            <label>Фон плеера</label>
            <div class="color-row">
              <input type="color" id="bgColor" value="#1a1a3a">

          <div class="setting-row">

      <!-- Панель предпросмотра с РАБОЧИМ плеером -->

        <div class="player-container">

  <script>
    (function() {
      // Элементы управления
      const bgColor = document.getElementById('bgColor');
      const textColor = document.getElementById('textColor');
      const accentColor = document.getElementById('accentColor');
      const langSelect = document.getElementById('langSelect');
      const playlistUrls = document.getElementById('playlistUrls');
      const updatePreview = document.getElementById('updatePreview');
      const copyCodeBtn = document.getElementById('copyCodeBtn');
      
      // Дисплеи цветов
      document.getElementById('bgColorValue').textContent = bgColor.value;
      document.getElementById('textColorValue').textContent = textColor.value;
      document.getElementById('accentColorValue').textContent = accentColor.value;
      
      // Элементы плеера
      const audio = document.getElementById('audioElement');
      const playerPreview = document.getElementById('playerPreview');
      const coverPreview = document.getElementById('coverPreview');
      const trackNamePreview = document.getElementById('trackNamePreview');
      const artistPreview = document.getElementById('artistPreview');
      const playlistContainer = document.getElementById('playlistContainer');
      const codeDisplay = document.getElementById('codeDisplay');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const shuffleBtn = document.getElementById('shuffleBtn');
      const playlistBtn = document.getElementById('playlistBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const currentTime = document.getElementById('currentTime');
      const totalTime = document.getElementById('totalTime');
      const volumeSlider = document.getElementById('volumeSlider');
      const volumeFill = document.getElementById('volumeFill');
      const volumeHandle = document.getElementById('volumeHandle');
      const volumeIcon = document.getElementById('volumeIcon');
      const retryText = document.getElementById('retryText');
      
      // Состояние
      let isPlaying = false;
      let isShuffle = false;
      let isPlaylistOpen = false;
      let currentTrack = 0;
      let volume = 0.7;
      
      // Плейлист
      const tracks = [
        { 
          name: 'Real Friends', 
          artist: 'Camila Cabello', 
          url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' 
        },
        { 
          name: 'Never Be the Same', 
          artist: 'Camila Cabello', 
          url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' 
        },
        { 
          name: 'Havana', 
          artist: 'Camila Cabello', 
          url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' 
        }
      ];
      
      // Переводы
      const translations = {
        ru: { play: '▶️', pause: '⏸️', retry: 'повторить' },
        en: { play: '▶️', pause: '⏸️', retry: 'reintentar' },
        es: { play: '▶️', pause: '⏸️', retry: 'reintentar' }
      };
      
      // ========== ФУНКЦИИ ПЛЕЕРА ==========
      
      function loadTrack(index) {
        if (index >= 0 && index < tracks.length) {
          currentTrack = index;
          audio.src = tracks[index].url;
          trackNamePreview.textContent = tracks[index].name;
          artistPreview.textContent = tracks[index].artist;
          audio.load();
          
          // Обновляем активный элемент в плейлисте
          document.querySelectorAll('.playlist-item').forEach((item, i) => {
            if (i === currentTrack) {
              item.classList.add('active');
            } else {
              item.classList.remove('active');
            }
          });
          
          // Если плеер играл, продолжаем воспроизведение
          if (isPlaying) {
            audio.play().catch(e => console.log('Playback failed:', e));
          }
        }
      }
      
      function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      }
      
      function updateVolume(value) {
        volume = Math.max(0, Math.min(1, value));
        audio.volume = volume;
        volumeFill.style.width = (volume * 100) + '%';
        volumeHandle.style.left = (volume * 100) + '%';
        
        // Обновляем иконку громкости
        if (volume === 0) {
          volumeIcon.textContent = '🔇';
        } else if (volume < 0.3) {
          volumeIcon.textContent = '🔈';
        } else if (volume < 0.7) {
          volumeIcon.textContent = '🔉';
        } else {
          volumeIcon.textContent = '🔊';
        }
      }
      
      // ========== ОБРАБОТЧИКИ ПЛЕЕРА ==========
      
      // Play/Pause
      playBtn.addEventListener('click', () => {
        if (!audio.src) {
          loadTrack(0);
        }
        
        if (isPlaying) {
          audio.pause();
        } else {
          audio.play().catch(e => console.log('Playback failed:', e));
        }
      });
      
      audio.addEventListener('play', () => {
        isPlaying = true;
        const lang = translations[langSelect.value];
        playBtn.textContent = lang.pause;
      });
      
      audio.addEventListener('pause', () => {
        isPlaying = false;
        const lang = translations[langSelect.value];
        playBtn.textContent = lang.play;
      });
      
      audio.addEventListener('ended', () => {
        // Автоматически переключаем на следующий трек
        let next = isShuffle 
          ? Math.floor(Math.random() * tracks.length)
          : (currentTrack + 1) % tracks.length;
        loadTrack(next);
      });
      
      // Время
      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const progress = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = progress + '%';
          currentTime.textContent = formatTime(audio.currentTime);
        }
      });
      
      audio.addEventListener('loadedmetadata', () => {
        totalTime.textContent = formatTime(audio.duration);
      });
      
      // Клик по прогрессу
      progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration) {
          audio.currentTime = percent * audio.duration;
        }
      });
      
      // Громкость
      function handleVolumeChange(e) {
        const rect = volumeSlider.getBoundingClientRect();
        let percent = (e.clientX - rect.left) / rect.width;
        percent = Math.max(0, Math.min(1, percent));
        updateVolume(percent);
      }
      
      volumeSlider.addEventListener('mousedown', (e) => {
        handleVolumeChange(e);
        
        const onMouseMove = (e) => {
          handleVolumeChange(e);
        };
        
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        };
        
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
      
      // Начальная громкость
      updateVolume(0.7);
      
      // Переключение треков
      nextBtn.addEventListener('click', () => {
        if (tracks.length === 0) return;
        let next;
        if (isShuffle) {
          do {
            next = Math.floor(Math.random() * tracks.length);
          } while (next === currentTrack && tracks.length > 1);
        } else {
          next = (currentTrack + 1) % tracks.length;
        }
        loadTrack(next);
      });
      
      prevBtn.addEventListener('click', () => {
        if (tracks.length === 0) return;
        let prev;
        if (isShuffle) {
          do {
            prev = Math.floor(Math.random() * tracks.length);
          } while (prev === currentTrack && tracks.length > 1);
        } else {
          prev = currentTrack > 0 ? currentTrack - 1 : tracks.length - 1;
        }
        loadTrack(prev);
      });
      
      // Шаффл
      shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.style.opacity = isShuffle ? '1' : '0.5';
        shuffleBtn.style.background = isShuffle ? 'rgba(79,172,254,0.3)' : 'rgba(255,255,255,0.1)';
      });
      
      // Плейлист
      playlistBtn.addEventListener('click', () => {
        isPlaylistOpen = !isPlaylistOpen;
        playlistContainer.style.display = isPlaylistOpen ? 'block' : 'none';
      });
      
      // Клик по элементам плейлиста
      document.querySelectorAll('.playlist-item').forEach(item => {
        item.addEventListener('click', () => {
          const index = parseInt(item.dataset.index);
          loadTrack(index);
        });
      });
      
      // ========== НАСТРОЙКИ ВНЕШНЕГО ВИДА ==========
      
      function updateColors() {
        playerPreview.style.background = bgColor.value;
        playerPreview.style.color = textColor.value;
        
        coverPreview.style.background = `linear-gradient(135deg, ${accentColor.value}, ${accentColor.value}dd)`;
        
        const buttons = playerPreview.querySelectorAll('.control-btn');
        buttons.forEach(btn => {
          btn.style.background = `rgba(255,255,255,0.1)`;
          btn.style.color = textColor.value;
        });
        
        playBtn.style.background = `linear-gradient(45deg, ${accentColor.value}, ${accentColor.value}dd)`;
        progressFill.style.background = `linear-gradient(90deg, ${accentColor.value}, ${accentColor.value}dd)`;
