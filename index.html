<iframe srcdoc="
<!DOCTYPE html>
<html>
<head>
  <meta charset='UTF-8'>
  <style>
    body { margin:0; background:transparent; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .player {
      background:#1a1a3a;
      border-radius:30px;
      padding:25px;
      color:white;
      width:360px;
      font-family:system-ui;
    }
    .cover {
      width:80px; height:80px;
      background:linear-gradient(135deg,#4facfe,#00f2fe);
      border-radius:20px;
      margin:0 auto 20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
    }
    .track { font-size:20px; font-weight:bold; text-align:center; margin-bottom:5px; }
    .artist { font-size:14px; opacity:0.7; text-align:center; margin-bottom:20px; }
    .progress { margin:20px 0; }
    .bar {
      width:100%; height:6px;
      background:rgba(255,255,255,0.1);
      border-radius:3px;
      cursor:pointer;
    }
    .fill {
      width:0%; height:100%;
      background:linear-gradient(90deg,#4facfe,#00f2fe);
      border-radius:3px;
    }
    .time { display:flex; justify-content:space-between; margin-top:5px; font-size:12px; opacity:0.7; }
    .buttons {
      display:flex; align-items:center; justify-content:center; gap:20px; margin:20px 0;
    }
    .btn {
      width:44px; height:44px; border-radius:50%; border:none;
      background:rgba(255,255,255,0.1); color:white; font-size:20px; cursor:pointer;
    }
    .play {
      width:60px; height:60px;
      background:linear-gradient(45deg,#4facfe,#00f2fe);
      font-size:28px;
    }
    .volume {
      display:flex; align-items:center; gap:10px; margin-top:15px;
    }
    .slider {
      flex:1; height:4px; background:rgba(255,255,255,0.1);
      border-radius:2px; position:relative; cursor:pointer;
    }
    .volume-fill {
      width:70%; height:100%;
      background:linear-gradient(90deg,#4facfe,#00f2fe);
      border-radius:2px;
    }
    .handle {
      width:12px; height:12px; background:white; border-radius:50%;
      position:absolute; top:-4px; left:70%; transform:translateX(-50%);
    }
  </style>
</head>
<body>
  <div class='player'>
    <audio id='audio'></audio>
    
    <div class='cover'>🎵</div>
    <div class='track' id='track'>Real Friends</div>
    <div class='artist' id='artist'>Camila Cabello</div>
    
    <div class='progress'>
      <div class='bar' id='progressBar'><div class='fill' id='progressFill'></div></div>
      <div class='time'><span id='current'>0:00</span><span id='total'>0:00</span></div>
    </div>
    
    <div class='buttons'>
      <button class='btn' id='shuffle'>🔀</button>
      <button class='btn' id='prev'>⏮️</button>
      <button class='btn play' id='play'>▶️</button>
      <button class='btn' id='next'>⏭️</button>
      <button class='btn' id='playlistBtn'>📋</button>
    </div>
    
    <div class='volume'>
      <span id='volumeIcon'>🔊</span>
      <div class='slider' id='volumeSlider'>
        <div class='volume-fill' id='volumeFill'></div>
        <div class='handle' id='volumeHandle'></div>
      </div>
    </div>
    
    <div id='playlist' style='margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; display:none;'>
      <div class='item active' data-index='0' style='display:flex; justify-content:space-between; padding:10px; border-radius:10px; background:rgba(79,172,254,0.25);'>1. Real Friends</div>
      <div class='item' data-index='1' style='display:flex; justify-content:space-between; padding:10px; border-radius:10px;'>2. Never Be the Same</div>
      <div class='item' data-index='2' style='display:flex; justify-content:space-between; padding:10px; border-radius:10px;'>3. Havana</div>
    </div>
  </div>

  <script>
    // Самый простой рабочий код
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const shuffleBtn = document.getElementById('shuffle');
    const playlistBtn = document.getElementById('playlistBtn');
    const playlist = document.getElementById('playlist');
    const trackEl = document.getElementById('track');
    const artistEl = document.getElementById('artist');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const current = document.getElementById('current');
    const total = document.getElementById('total');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeFill = document.getElementById('volumeFill');
    const volumeHandle = document.getElementById('volumeHandle');
    const volumeIcon = document.getElementById('volumeIcon');
    
    // Треки
    const tracks = [
      'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
      'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
      'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
    ];
    
    let currentTrack = 0;
    let isPlaying = false;
    let isShuffle = false;
    
    function loadTrack(index) {
      if (index >= 0 && index < tracks.length) {
        currentTrack = index;
        audio.src = tracks[index];
        audio.load();
      }
    }
    
    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }
    
    function setVolume(percent) {
      const vol = Math.max(0, Math.min(1, percent));
      audio.volume = vol;
      volumeFill.style.width = (vol * 100) + '%';
      volumeHandle.style.left = (vol * 100) + '%';
      if (vol === 0) volumeIcon.textContent = '🔇';
      else if (vol < 0.3) volumeIcon.textContent = '🔈';
      else if (vol < 0.7) volumeIcon.textContent = '🔉';
      else volumeIcon.textContent = '🔊';
    }
    
    playBtn.onclick = () => {
      if (!audio.src) loadTrack(0);
      if (isPlaying) {
        audio.pause();
      } else {
        audio.play();
      }
    };
    
    audio.onplay = () => {
      isPlaying = true;
      playBtn.textContent = '⏸️';
    };
    
    audio.onpause = () => {
      isPlaying = false;
      playBtn.textContent = '▶️';
    };
    
    audio.onended = () => {
      let next = isShuffle ? Math.floor(Math.random() * tracks.length) : (currentTrack + 1) % tracks.length;
      loadTrack(next);
      if (isPlaying) audio.play();
    };
    
    audio.ontimeupdate = () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        current.textContent = formatTime(audio.currentTime);
      }
    };
    
    audio.onloadedmetadata = () => {
      total.textContent = formatTime(audio.duration);
    };
    
    progressBar.onclick = (e) => {
      const rect = progressBar.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      if (audio.duration) audio.currentTime = percent * audio.duration;
    };
    
    volumeSlider.onmousedown = (e) => {
      const rect = volumeSlider.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      setVolume(percent);
      
      const onMove = (e) => {
        const rect = volumeSlider.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        setVolume(percent);
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    };
    
    nextBtn.onclick = () => {
      let next = isShuffle ? Math.floor(Math.random() * tracks.length) : (currentTrack + 1) % tracks.length;
      loadTrack(next);
      if (isPlaying) audio.play();
    };
    
    prevBtn.onclick = () => {
      let prev = isShuffle ? Math.floor(Math.random() * tracks.length) : currentTrack > 0 ? currentTrack - 1 : tracks.length - 1;
      loadTrack(prev);
      if (isPlaying) audio.play();
    };
    
    shuffleBtn.onclick = () => {
      isShuffle = !isShuffle;
      shuffleBtn.style.opacity = isShuffle ? '1' : '0.5';
    };
    
    playlistBtn.onclick = () => {
      playlist.style.display = playlist.style.display === 'none' ? 'block' : 'none';
    };
    
    loadTrack(0);
    setVolume(0.7);
  </script>
</body>
</html>
" style="border:none; width:100%; height:600px; background:transparent;"></iframe>
